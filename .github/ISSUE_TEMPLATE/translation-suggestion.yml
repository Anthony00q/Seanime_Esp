name: Sugerencia de Traducción
description: Sugiere una mejora para una traducción existente
title: 'sugerencia: '
labels:
  - sugerencia
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **Nota:** Este repositorio está dedicado a las **traducciones multilingües** de Seanime (Español, Portugués, etc) y a características exclusivas de este fork.
        Para bugs generales de la aplicación o nuevas funcionalidades principales, abre un issue en el [repositorio original](https://github.com/5rahim/seanime/issues).

  - type: dropdown
    id: seccion
    attributes:
      label: Sección Afectada
      options:
        - Inicio (Home)
        - Horario (Schedule)
        - Descubrir (Discover)
        - Listas de Anime (AniList)
        - Página de un Anime/Manga
        - Colección de Manga
        - Reproductor de Video
        - Nakama (Watch Parties)
        - Descargador Automático (Auto Downloader)
        - Torrent y Streaming (Lista de torrents)
        - Extensiones
        - Paleta de Comandos (Sea Command)
        - Ajustes (Settings)
        - Bienvenida y Login
        - Avisos emergentes (Toasts / Notificaciones)
        - Otro / No estoy seguro
    validations:
      required: true

  - type: textarea
    id: texto-actual
    attributes:
      label: Traducción Actual
      description: La traducción que existe ahora
      placeholder: 'Ej: "Habilitar la reproducción automática"'
    validations:
      required: true

  - type: textarea
    id: sugerencia
    attributes:
      label: Traducción Sugerida
      description: La traducción alternativa que propones
      placeholder: 'Ej: "Activar reproducción automática"'
    validations:
      required: true

  - type: textarea
    id: razon
    attributes:
      label: Razón
      description: Por qué tu sugerencia es mejor (más natural, más precisa, más consistente con el resto, etc.)
    validations:
      required: true

  - type: textarea
    id: contexto
    attributes:
      label: Contexto
      description: Dónde se usa este texto (ayuda a decidir si el cambio es apropiado)
      placeholder: "Ej: Es el label de un checkbox en Ajustes → Reproducción"
